<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Stats</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-width: 260px;
      max-width: 340px;
      background: #f7f9fb;
      margin: 0;
      padding: 18px 16px 14px 16px;
      border-radius: 12px;
      box-shadow: 0 2px 12px #0001;
    }
    h3 {
      margin: 0 0 16px 0;
      font-size: 18px;
      text-align: center;
      color: #224abe;
      letter-spacing: 0.5px;
    }
    .btn {
      width: 100%;
      padding: 10px 0;
      margin-top: 10px;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(90deg, #4e73df 0%, #224abe 100%);
      color: #fff;
      box-shadow: 0 2px 8px #4e73df22;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
      outline: none;
    }
    .btn:hover {
      background: linear-gradient(90deg, #224abe 0%, #4e73df 100%);
      box-shadow: 0 4px 16px #4e73df33;
      opacity: 0.95;
    }
    .btn.active {
      background: linear-gradient(90deg, #2ecc40 0%, #27ae60 100%);
      color: #fff;
    }
    #count {
      margin-top: 16px;
      font-weight: bold;
      font-size: 15px;
      color: #224abe;
      text-align: center;
      letter-spacing: 0.2px;
    }
    #status {
      margin-top: 10px;
      min-height: 18px;
      text-align: center;
      font-size: 14px;
      color: #27ae60;
      transition: color 0.2s;
    }
  </style>
</head>
<body>
  <h3>LinkedIn Locations</h3>
  <button id="toggle-btn" class="btn">Включить сбор</button>
  <button id="export-btn" class="btn">Экспорт CSV</button>
  <button id="reset-btn" class="btn" style="background:linear-gradient(90deg,#e74c3c 0%,#c0392b 100%)">Сбросить</button>
  <div id="count">Собрано: 0</div>
  <div id="status"></div>
  <script src="modules/logger.js"></script>
  <script src="modules/utils.js"></script>
  <script src="modules/constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
